<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
  <title>Happy 25th Birthday William! 🎂</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎉 Happy 25th Birthday William! 🎂</h1>
  </header>

  <div id="gameWrap">
    <canvas id="game" width="480" height="640"></canvas>
    <div id="overlay">
      <div id="overlayInner">
        <h2 id="overlayTitle">Floppy William</h2>
        <p id="overlayText">Press SPACE or click to flap.<br/>Avoid the cakes! 🎂</p>
        <button id="startBtn">Start</button>
      </div>
    </div>
    <div id="hud">
      <span>Score: <b id="score">0</b></span>
      <span>Best: <b id="best">0</b></span>
    </div>
  </div>

  <p class="hint">SPACE / Click / Tap to flap • Dodge the cakes 🎂 • Collect presents 🎁</p>

  <script src="game.js"></script>
</body>
</html>
